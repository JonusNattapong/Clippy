name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  make:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
      - name: Install dependencies
        run: npm ci
      - name: Make
        run: npm run make
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-artifacts
          path: out/make/**/*

  release:
    needs: make
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Setup Node for image generation
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Generate release cover image
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_API_URL: ${{ secrets.OPENROUTER_API_URL }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          COVER_SIZE: "1920x600"
          COVER_PROMPT: "Clippy in a 3D world reminiscent of Toy Story, vibrant cinematic lighting, full-bleed banner composition, include the text 'Clippy' and the version '{version}' prominently, retro Windows 95 color accents."
          COVER_MODEL: "bytedance-seed/seedream-4.5"
        run: |
          mkdir -p artifacts
          node scripts/generate-release-cover.js

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ![release cover](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/release-cover.png)

            Release artifacts for ${{ github.ref_name }}.
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
