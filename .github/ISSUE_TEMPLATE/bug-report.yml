name: Bug Report
description: Report a reproducible problem in Clippy
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Please include enough detail for us to reproduce the issue quickly.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and what you expected to happen.
      placeholder: The app crashes when I open Settings after the first-run flow.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps so we can reproduce the problem.
      placeholder: |
        1. Launch the app
        2. Open Settings
        3. Click Memory
        4. Observe the crash
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: If known, share the version or commit where the bug appears.
      placeholder: v0.4.3
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant logs, stack traces, or screenshots.
      render: shell
