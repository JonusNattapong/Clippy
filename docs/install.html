      <h1>Installation</h1>
      <h2>Binary Releases</h2>
      <p>Download prebuilt releases from the project's GitHub Releases page.</p>
      <h2>From source</h2>
      <pre><code>git clone https://github.com/JonusNattapong/Clippy.git
cd Clippy
npm ci
npm run start</code></pre>
      <h2>.env</h2>
      <p>Copy <code>.env.example</code> to <code>.env</code> and add API keys for cloud providers if needed.</p>
