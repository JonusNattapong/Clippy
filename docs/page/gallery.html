<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gallery — Cliplala</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css" />
    <style>body{padding:20px;background:#008080;color:#111;font-family:Segoe UI, Tahoma, sans-serif}.window{max-width:980px;margin:0 auto}.thumb{width:160px;height:120px;border:2px solid #808080;background:#fff;display:inline-block;margin:6px;padding:6px;vertical-align:top}</style>
  </head>
  <body>
    <div class="window">
      <h1>Gallery / Demos</h1>
      <div>
        <div class="thumb"><img src="images/icon_video.png" alt="screenshot" style="width:100%;height:100%;object-fit:cover"/></div>
        <div class="thumb"><img src="images/icon_about.png" alt="about" style="width:100%;height:100%;object-fit:cover"/></div>
        <div class="thumb"><img src="images/icon_download.png" alt="download" style="width:100%;height:100%;object-fit:cover"/></div>
        <div class="thumb"><img src="images/icon_github.png" alt="github" style="width:100%;height:100%;object-fit:cover"/></div>
        <div class="thumb"><img src="images/windows.png" alt="windows" style="width:100%;height:100%;object-fit:cover"/></div>
        <div class="thumb"><img src="images/macos.png" alt="macos" style="width:100%;height:100%;object-fit:cover"/></div>
      </div>
    </div>
  </body>
</html>
